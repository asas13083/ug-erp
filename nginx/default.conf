server {
    listen 80;
    server_name _;

    # زيادة حجم الملفات المسموح رفعها (صور الأصناف/العملاء) — 10 ميجا
    client_max_body_size 10M;

    # ============ الفرونت إند (الملفات الثابتة اللي اتبنت) ============
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # مهم لـ React Router: أي مسار مش ملف حقيقي يرجع لـ index.html
        # (عشان التنقل بين صفحات البرنامج يشتغل صح، مش يديك 404)
        try_files $uri $uri/ /index.html;
    }

    # ============ الباك إند — أي طلب لـ /api بيتوجّه لحاوية الباك إند ============
    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # طلبات رفع الملفات وتصدير الـPDF ممكن تاخد وقت أطول من المعتاد
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
