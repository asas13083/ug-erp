server {
    listen 80;
    server_name ug-erp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ug-erp.com;
    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/ug-erp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ug-erp.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # الصور المرفوعة (أصناف، عملاء، مستخدمين) — لازم تتوجّه للباك إند، مش
    # تتدوّر في ملفات الواجهة. غياب السطر ده كان بيخلي كل الصور مش ظاهرة
    location /uploads/ {
        proxy_pass http://backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
