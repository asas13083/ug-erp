version: '3.8'

services:
  # ============ قاعدة البيانات ============
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ug_erp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ug_erp}
    volumes:
      # من PostgreSQL 18، مكان التخزين اتغيّر لـ /var/lib/postgresql (مش
      # /var/lib/postgresql/data زي الإصدارات الأقدم) — لازم نطابقه بالظبط
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ug_erp}']
      interval: 5s
      timeout: 5s
      retries: 10

  # ============ الباك إند ============
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      # بيتغلب على أي DATABASE_URL في .env — عشان دايماً يشاور على حاوية
      # postgres بالاسم، مش localhost (اللي مش موجود جوه الحاوية أصلاً)
      DATABASE_URL: postgresql://${POSTGRES_USER:-ug_erp}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ug_erp}
      # نفس الفكرة: مسارات pg_dump/psql بتاعت ويندوز في backend/.env مالهاش
      # معنى جوه الحاوية — بنفضّيهم عشان الكود يستخدم النسخة المثبّتة جوه
      # الحاوية نفسها تلقائياً (من postgresql-client في الـDockerfile)
      PG_DUMP_PATH: ""
      PSQL_PATH: ""
    volumes:
      # نسخ احتياطية وملفات مرفوعة وسجلات بتتخزن على السيرفر نفسه، برّه الحاوية —
      # عشان لو الحاوية اتبنت تاني، البيانات دي متضيعش
      - ./backend/backups:/app/backups
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    expose:
      - '4000'

  # ============ الفرونت إند + Nginx ============
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
